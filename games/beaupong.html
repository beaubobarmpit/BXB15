<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeauPong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #0a0e27;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
        }
        .container-fluid {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        canvas {
            border: 3px solid #4a9eff;
            background-color: #000;
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
            border-radius: 4px;
        }
        #score {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #4a9eff;
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
        }
        #gameOver {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            background: linear-gradient(135deg, #1a1f3a 0%, #0a0e27 100%);
            padding: 50px;
            border: 3px solid #4a9eff;
            border-radius: 8px;
            text-align: center;
            display: none;
            z-index: 100;
            box-shadow: 0 0 30px rgba(74, 158, 255, 0.4);
        }
        #gameOverText {
            color: #4a9eff;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
        }
        #gameOver button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: 600;
            background-color: #4a9eff;
            color: #0a0e27;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #gameOver button:hover {
            background-color: #6bb3ff;
            box-shadow: 0 0 15px rgba(74, 158, 255, 0.6);
        }
        .info-text {
            color: #8a8a8a;
            font-size: 14px;
            margin-top: 15px;
            letter-spacing: 0.5px;
        }
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: #4a9eff;
            color: #0a0e27;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 14px;
        }
        .back-button:hover {
            background-color: #6bb3ff;
            box-shadow: 0 0 15px rgba(74, 158, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <a href="../../index.html" class="back-button">← Back</a>
        <div id="score">0 - 0</div>
        <canvas id="pong" width="1200" height="600"></canvas>
        <div class="info-text">Use W/S to move · First to 11 wins</div>
    </div>
    
    <div id="gameOver">
        <div id="gameOverText"></div>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverDiv = document.getElementById('gameOver');
        const gameOverText = document.getElementById('gameOverText');

        // Game settings
        const winScore = 11;
        let gameEnded = false;

        // Ball
        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 0,
            radius: 40
        };

        const baseSpeed = 5;
        const maxSpeed = 10;
        let ballHitCount = 0;

        // Paddles
        const paddleWidth = 15;
        const paddleHeight = 120;
        let leftPaddle = {
            x: 0,
            y: canvas.height / 2 - paddleHeight / 2,
            dy: 0
        };
        let rightPaddle = {
            x: canvas.width - paddleWidth,
            y: canvas.height / 2 - paddleHeight / 2,
            dy: 0
        };

        // Scores
        let leftScore = 0;
        let rightScore = 0;

        // Images
        const ballImg = new Image();
        ballImg.src = '../images/ball.png';

        const leftPaddleImg = new Image();
        leftPaddleImg.src = '../images/bradenkiss.png';

        const rightPaddleImg = new Image();
        rightPaddleImg.src = '../images/xavierkiss.png';

        const bradenKissImg = new Image();
        bradenKissImg.src = '../images/bradenkiss.png';

        const xavierKissImg = new Image();
        xavierKissImg.src = '../images/xavierkiss.png';

        const ballKissLeftImg = new Image();
        ballKissLeftImg.src = '../images/ballkissleft.png';

        const ballKissRightImg = new Image();
        ballKissRightImg.src = '../images/ballkissright.png';

        const mwahSound = new Audio('../sfx/mwah.mp3');
        mwahSound.volume = 0.75;

        let currentBallImg = ballImg;

        // Draw ball
        function drawBall() {
            ctx.drawImage(currentBallImg, ball.x - ball.radius, ball.y - ball.radius, ball.radius * 2, ball.radius * 2);
        }

        // Draw paddles
        function drawPaddles() {
            ctx.drawImage(leftPaddleImg, leftPaddle.x, leftPaddle.y, paddleWidth, paddleHeight);
            ctx.drawImage(rightPaddleImg, rightPaddle.x, rightPaddle.y, paddleWidth, paddleHeight);
        }

        // Draw center line
        function drawCenterLine() {
            ctx.setLineDash([5, 15]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.strokeStyle = '#4a9eff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Calculate ball direction based on paddle hit position
        function calculateBallDirection(paddleY, isLeftPaddle) {
            const paddleCenter = paddleY + paddleHeight / 2;
            const hitPosition = ball.y - paddleCenter;
            const normalizedHit = hitPosition / (paddleHeight / 2);

            const maxAngle = Math.PI / 3;
            const angle = normalizedHit * maxAngle;

            const currentSpeed = Math.min(baseSpeed + (ballHitCount * 0.3), maxSpeed);
            const direction = isLeftPaddle ? 1 : -1;

            return {
                dx: direction * currentSpeed * Math.cos(angle),
                dy: currentSpeed * Math.sin(angle)
            };
        }

        // Update ball position
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.dy = -ball.dy;
            } else if (ball.y + ball.radius > canvas.height) {
                ball.y = canvas.height - ball.radius;
                ball.dy = -ball.dy;
            }

            // Ball collision with left paddle
            if (ball.x - ball.radius < leftPaddle.x + paddleWidth &&
                ball.y > leftPaddle.y &&
                ball.y < leftPaddle.y + paddleHeight &&
                ball.dx < 0) {
                ball.x = leftPaddle.x + paddleWidth + ball.radius;
                ballHitCount++;
                const newDirection = calculateBallDirection(leftPaddle.y, true);
                ball.dx = newDirection.dx;
                ball.dy = newDirection.dy;
                currentBallImg = ballKissLeftImg;
                mwahSound.currentTime = 0;
                mwahSound.play().catch(() => {});
                setTimeout(() => currentBallImg = ballImg, 500);
            }

            // Ball collision with right paddle
            if (ball.x + ball.radius > rightPaddle.x &&
                ball.y > rightPaddle.y &&
                ball.y < rightPaddle.y + paddleHeight &&
                ball.dx > 0) {
                ball.x = rightPaddle.x - ball.radius;
                ballHitCount++;
                const newDirection = calculateBallDirection(rightPaddle.y, false);
                ball.dx = newDirection.dx;
                ball.dy = newDirection.dy;
                currentBallImg = ballKissRightImg;
                mwahSound.currentTime = 0;
                mwahSound.play().catch(() => {});
                setTimeout(() => currentBallImg = ballImg, 500);
            }

            // Ball out of bounds
            if (ball.x < 0) {
                rightScore++;
                resetBall();
            } else if (ball.x > canvas.width) {
                leftScore++;
                resetBall();
            }

            // Check for winner
            if (leftScore >= winScore) {
                endGame('Braden Wins!');
            } else if (rightScore >= winScore) {
                endGame('Xavier Wins!');
            }
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = baseSpeed;
            ball.dy = 0;
            ballHitCount = 0;
            currentBallImg = ballImg;
            updateScore();
        }

        function moveRightPaddleAI() {
            const aiSpeed = 5.5;
            const deadZone = 15;
            
            if (rightPaddle.y + paddleHeight / 2 < ball.y - deadZone) {
                rightPaddle.dy = aiSpeed;
            } else if (rightPaddle.y + paddleHeight / 2 > ball.y + deadZone) {
                rightPaddle.dy = -aiSpeed;
            } else {
                rightPaddle.dy = 0;
            }
        }

        // Update paddles
        function updatePaddles() {
            leftPaddle.y += leftPaddle.dy;
            rightPaddle.y += rightPaddle.dy;

            // Keep paddles in bounds
            if (leftPaddle.y < 0) leftPaddle.y = 0;
            if (leftPaddle.y > canvas.height - paddleHeight) leftPaddle.y = canvas.height - paddleHeight;
            if (rightPaddle.y < 0) rightPaddle.y = 0;
            if (rightPaddle.y > canvas.height - paddleHeight) rightPaddle.y = canvas.height - paddleHeight;
        }

        // Update score display
        function updateScore() {
            scoreElement.textContent = leftScore + ' - ' + rightScore;
        }

        // End game
        function endGame(winner) {
            gameEnded = true;
            gameOverText.textContent = winner;
            gameOverDiv.style.display = 'block';
        }

        // Draw everything
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawCenterLine();
            drawBall();
            drawPaddles();
        }

        // Game loop
        function gameLoop() {
            if (!gameEnded) {
                moveRightPaddleAI();
                updateBall();
                updatePaddles();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Handle keyboard input
        document.addEventListener('keydown', (e) => {
            if (gameEnded) return;
            switch (e.key) {
                case 'w':
                case 'W':
                    leftPaddle.dy = -7.5;
                    break;
                case 's':
                case 'S':
                    leftPaddle.dy = 7.5;
                    break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch (e.key) {
                case 'w':
                case 'W':
                case 's':
                case 'S':
                    leftPaddle.dy = 0;
                    break;
            }
        });

        // Start game when all images load
        let imagesLoaded = 0;
        const totalImages = 7;

        function checkImagesLoaded() {
            imagesLoaded++;
            if (imagesLoaded === totalImages) {
                gameLoop();
            }
        }

        ballImg.onload = checkImagesLoaded;
        leftPaddleImg.onload = checkImagesLoaded;
        rightPaddleImg.onload = checkImagesLoaded;
        bradenKissImg.onload = checkImagesLoaded;
        xavierKissImg.onload = checkImagesLoaded;
        ballKissLeftImg.onload = checkImagesLoaded;
        ballKissRightImg.onload = checkImagesLoaded;
    </script>
</body>
</html>
