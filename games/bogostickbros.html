<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Beaurio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #87CEEB;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #333;
            background-color: #87CEEB;
        }
        #gameOverScreen {
            display: none;
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            z-index: 10;
        }
        #gameOverScreen h1 {
            margin: 0 0 20px 0;
        }
        #gameOverScreen button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div id="gameOverScreen">
        <h1 style="padding-right: 10px;">Game Over!</h1>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverScreen = document.getElementById('gameOverScreen');

        // Player object
        const player = {
            x: 50,
            y: canvas.height - 80,
            width: 30,
            height: 40,
            velocityY: 0,
            jumping: false,
            speed: 5
        };

        // Game variables
        let obstacles = [];
        let gameRunning = true;
        let distanceTraveled = 0;
        const gravity = 0.6;
        const jumpPower = 12;
        const groundLevel = canvas.height - 80;

        // Keyboard input
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Obstacle class
        class Obstacle {
            constructor(x) {
                this.x = x;
                this.y = groundLevel + 10;
                this.width = 30;
                this.height = 50;
            }

            draw() {
                ctx.fillStyle = '#FF6B6B';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }

            update() {
                this.x -= 5;
            }
        }

        // Spawn obstacles
        function spawnObstacle() {
            if (gameRunning && Math.random() < 0.02) {
                obstacles.push(new Obstacle(canvas.width));
            }
        }

        // Check collision
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Update game
        function update() {
            if (!gameRunning) return;

            // Player movement
            if (keys['ArrowRight'] || keys['d']) {
                player.x += player.speed;
            }
            if (keys['ArrowLeft'] || keys['a']) {
                player.x = Math.max(0, player.x - player.speed);
            }

            // Jumping
            if ((keys[' '] || keys['ArrowUp'] || keys['w']) && !player.jumping) {
                player.velocityY = -jumpPower;
                player.jumping = true;
            }

            // Apply gravity
            player.velocityY += gravity;
            player.y += player.velocityY;

            // Ground collision
            if (player.y >= groundLevel) {
                player.y = groundLevel;
                player.velocityY = 0;
                player.jumping = false;
            }

            // Spawn and update obstacles
            spawnObstacle();
            obstacles.forEach((obs, index) => {
                obs.update();
                if (checkCollision(player, obs)) {
                    endGame();
                }
                if (obs.x + obs.width < 0) {
                    obstacles.splice(index, 1);
                    distanceTraveled += 100;
                }
            });
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw ground
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, groundLevel + 40, canvas.width, 60);

            // Draw player
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Draw obstacles
            obstacles.forEach(obs => obs.draw());

            // Draw distance
            ctx.fillStyle = '#000';
            ctx.font = '20px Arial';
            ctx.fillText(`Distance: ${distanceTraveled}`, 10, 30);
        }

        // End game
        function endGame() {
            gameRunning = false;
            gameOverScreen.style.display = 'flex';
            gameOverScreen.style.justifyContent = 'center';
            gameOverScreen.style.alignItems = 'center';
            gameOverScreen.style.position = 'fixed';
            gameOverScreen.style.top = '50%';
            gameOverScreen.style.left = '50%';
            gameOverScreen.style.transform = 'translate(-50%, -50%)';
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
