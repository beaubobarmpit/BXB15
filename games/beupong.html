s<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeauPong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #0a0e27;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
        }
        .container-fluid {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        canvas {
            border: 3px solid #4a9eff;
            background-color: #000;
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
            border-radius: 4px;
        }
        #score {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #4a9eff;
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
        }
        #gameOver {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            background: linear-gradient(135deg, #1a1f3a 0%, #0a0e27 100%);
            padding: 50px;
            border: 3px solid #4a9eff;
            border-radius: 8px;
            text-align: center;
            display: none;
            z-index: 100;
            box-shadow: 0 0 30px rgba(74, 158, 255, 0.4);
        }
        #gameOverText {
            color: #4a9eff;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
        }
        #gameOver button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: 600;
            background-color: #4a9eff;
            color: #0a0e27;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #gameOver button:hover {
            background-color: #6bb3ff;
            box-shadow: 0 0 15px rgba(74, 158, 255, 0.6);
        }
        .info-text {
            color: #8a8a8a;
            font-size: 14px;
            margin-top: 15px;
            letter-spacing: 0.5px;
        }
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: #4a9eff;
            color: #0a0e27;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 14px;
        }
        .back-button:hover {
            background-color: #6bb3ff;
            box-shadow: 0 0 15px rgba(74, 158, 255, 0.6);
        }
        .settings-button {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            font-size: 18px;
            background-color: #4a9eff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #settingsMenu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0a0e27;
            border: 3px solid #4a9eff;
            padding: 30px;
            display: none;
            z-index: 200;
            width: 300px;
            text-align: center;
        }
        .setting-group {
            margin: 15px 0;
        }
        .powerup-info {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }
        .powerup-info img {
            width: 40px;
            height: 40px;
        }
        .powerup-info p {
            font-size: 12px;
        }
    </style>
</head>
<body>
    <button id="settingsBtn" class="settings-button">⚙️</button>

    <div id="settingsMenu">
        <h2>Settings</h2>
        <div class="setting-group">
            <label>Music</label>
            <button id="toggleMusic">Toggle</button>
        </div>
        <div class="setting-group">
            <label>AI Difficulty</label>
            <select id="aiDifficulty">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>
        <h3>Power-Ups</h3>
        <div class="powerup-info">
            <div>
                <img src="../images/powerup_big.png">
                <p>Bigger Paddle</p>
            </div>
            <div>
                <img src="../images/powerup_fast.png">
                <p>Faster Ball</p>
            </div>
            <div>
                <img src="../images/powerup_slow.png">
                <p>Slower Ball</p>
            </div>
        </div>
        <button id="closeSettings">Close</button>
    </div>

    <div class="container-fluid">
        <a href="../index.html" class="back-button">← Back</a>
        <div id="score">0 - 0</div>
        <canvas id="pong" width="1200" height="600"></canvas>
        <div class="info-text">Use W/S to move · First to 11 wins</div>
    </div>

    <div id="gameOver">
        <div id="gameOverText"></div>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverDiv = document.getElementById('gameOver');
        const gameOverText = document.getElementById('gameOverText');

        const settingsBtn = document.getElementById('settingsBtn');
        const settingsMenu = document.getElementById('settingsMenu');
        const closeSettings = document.getElementById('closeSettings');
        const toggleMusicBtn = document.getElementById('toggleMusic');
        const aiSelect = document.getElementById('aiDifficulty');

        // ================= SETTINGS =================
        const winScore = 11;
        let gameEnded = false;
        let musicOn = true;

        // AI state — declared before use
        let aiDifficulty = "medium";
        let aiTargetY = canvas.height / 2;
        let aiReactionTimer = 0;

        // ================= EFFECTS STATE =================
        let particles = [];
        let powerUps = [];

        // ================= BALL =================
        const baseSpeed = 5;
        const maxSpeed = 10;
        let ballHitCount = 0;

        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: baseSpeed,
            dy: 0,
            radius: 40
        };

        // ================= PADDLES =================
        const paddleWidth = 15;
        let paddleHeight = 120;

        let leftPaddle = {
            x: 0,
            y: canvas.height / 2 - paddleHeight / 2,
            dy: 0
        };

        let rightPaddle = {
            x: canvas.width - paddleWidth,
            y: canvas.height / 2 - paddleHeight / 2,
            dy: 0
        };

        // ================= SCORES =================
        let leftScore = 0;
        let rightScore = 0;

        // ================= IMAGES =================
        const ballImg = new Image();
        ballImg.src = '../images/ball.png';

        const leftPaddleImg = new Image();
        leftPaddleImg.src = '../images/bradenkiss.png';

        const rightPaddleImg = new Image();
        rightPaddleImg.src = '../images/xavierkiss.png';

        const ballKissLeftImg = new Image();
        ballKissLeftImg.src = '../images/ballkissleft.png';

        const ballKissRightImg = new Image();
        ballKissRightImg.src = '../images/ballkissright.png';

        const powerUpImages = {
            big: new Image(),
            fast: new Image(),
            slow: new Image()
        };
        powerUpImages.big.src = '../images/powerup_big.png';
        powerUpImages.fast.src = '../images/powerup_fast.png';
        powerUpImages.slow.src = '../images/powerup_slow.png';

        let currentBallImg = ballImg;

        // ================= SOUND =================
        const mwahSound = new Audio('../sfx/mwah.mp3');
        mwahSound.volume = 1;

        const bgMusic = new Audio('../sfx/pongmusic.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.2;

        // ================= SETTINGS EVENTS =================
        settingsBtn.onclick = () => { settingsMenu.style.display = 'block'; };
        closeSettings.onclick = () => { settingsMenu.style.display = 'none'; };

        toggleMusicBtn.onclick = () => {
            musicOn = !musicOn;
            musicOn ? bgMusic.play().catch(() => {}) : bgMusic.pause();
        };

        aiSelect.onchange = () => { aiDifficulty = aiSelect.value; };

        document.addEventListener('click', () => {
            bgMusic.play().catch(() => {});
        }, { once: true });

        // ================= EFFECTS =================
        function screenShake() {
            canvas.style.transform = `translate(${Math.random() * 8 - 4}px, ${Math.random() * 8 - 4}px)`;
            setTimeout(() => canvas.style.transform = 'translate(0,0)', 50);
        }

        function spawnParticles(x, y) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x, y,
                    dx: Math.random() * 3 - 1.5,
                    dy: Math.random() * 3 - 1.5,
                    life: 25
                });
            }
        }

        function updateParticles() {
            particles.forEach(p => { p.x += p.dx; p.y += p.dy; p.life--; });
            particles = particles.filter(p => p.life > 0);
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.fillStyle = "#4a9eff";
                ctx.fillRect(p.x, p.y, 3, 3);
            });
        }

        // ================= POWERUPS =================
        let powerUpInterval = null;

        function spawnPowerUp() {
            if (gameEnded) return;
            const types = ["big", "fast", "slow"];
            powerUps.push({
                x: Math.random() * (canvas.width - 40) + 20,
                y: Math.random() * (canvas.height - 40) + 20,
                type: types[Math.floor(Math.random() * types.length)],
                size: 40
            });
        }

        powerUpInterval = setInterval(spawnPowerUp, 6000);

        function drawPowerUps() {
            powerUps.forEach(p => {
                ctx.drawImage(
                    powerUpImages[p.type],
                    p.x - p.size / 2,
                    p.y - p.size / 2,
                    p.size, p.size
                );
            });
        }

        function checkPowerUps() {
            powerUps = powerUps.filter(p => {
                const dist = Math.hypot(ball.x - p.x, ball.y - p.y);
                if (dist < ball.radius + p.size / 2) {
                    applyPowerUp(p.type);
                    return false;
                }
                return true;
            });
        }

        function applyPowerUp(type) {
            if (type === "big") {
                paddleHeight += 30;
                setTimeout(() => { paddleHeight -= 30; }, 6000);
            }
            if (type === "fast") {
                ball.dx *= 1.3;
                ball.dy *= 1.3;
            }
            if (type === "slow") {
                ball.dx *= 0.7;
                ball.dy *= 0.7;
            }
        }

        // ================= DRAW =================
        function drawBall() {
            ctx.drawImage(currentBallImg, ball.x - ball.radius, ball.y - ball.radius, ball.radius * 2, ball.radius * 2);
        }

        function drawPaddles() {
            ctx.drawImage(leftPaddleImg, leftPaddle.x, leftPaddle.y, paddleWidth, paddleHeight);
            ctx.drawImage(rightPaddleImg, rightPaddle.x, rightPaddle.y, paddleWidth, paddleHeight);
        }

        function drawCenterLine() {
            ctx.setLineDash([5, 15]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.strokeStyle = '#4a9eff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // ================= BALL LOGIC =================
        function calculateBallDirection(paddleY, isLeftPaddle) {
            const paddleCenter = paddleY + paddleHeight / 2;
            const hitPosition = ball.y - paddleCenter;
            const normalizedHit = hitPosition / (paddleHeight / 2);

            const maxAngle = Math.PI / 3;
            const angle = normalizedHit * maxAngle;

            const currentSpeed = Math.min(baseSpeed + (ballHitCount * 0.3), maxSpeed);
            const direction = isLeftPaddle ? 1 : -1;

            return {
                dx: direction * currentSpeed * Math.cos(angle),
                dy: currentSpeed * Math.sin(angle)
            };
        }

        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall bounce
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.dy = Math.abs(ball.dy);
            }
            if (ball.y + ball.radius > canvas.height) {
                ball.y = canvas.height - ball.radius;
                ball.dy = -Math.abs(ball.dy);
            }

            // Left paddle collision
            if (ball.dx < 0 &&
                ball.x - ball.radius < leftPaddle.x + paddleWidth &&
                ball.x + ball.radius > leftPaddle.x &&
                ball.y > leftPaddle.y &&
                ball.y < leftPaddle.y + paddleHeight) {

                ball.x = leftPaddle.x + paddleWidth + ball.radius;
                ballHitCount++;
                const newDir = calculateBallDirection(leftPaddle.y, true);
                ball.dx = newDir.dx;
                ball.dy = newDir.dy;
                ball.dy += leftPaddle.dy * 0.25;

                spawnParticles(ball.x, ball.y);
                screenShake();
                currentBallImg = ballKissLeftImg;
                mwahSound.currentTime = 0;
                mwahSound.play().catch(() => {});
                setTimeout(() => { currentBallImg = ballImg; }, 500);
            }

            // Right paddle collision
            if (ball.dx > 0 &&
                ball.x + ball.radius > rightPaddle.x &&
                ball.x - ball.radius < rightPaddle.x + paddleWidth &&
                ball.y > rightPaddle.y &&
                ball.y < rightPaddle.y + paddleHeight) {

                ball.x = rightPaddle.x - ball.radius;
                ballHitCount++;
                const newDir = calculateBallDirection(rightPaddle.y, false);
                ball.dx = newDir.dx;
                ball.dy = newDir.dy;
                ball.dy += rightPaddle.dy * 0.25;

                spawnParticles(ball.x, ball.y);
                screenShake();
                currentBallImg = ballKissRightImg;
                mwahSound.currentTime = 0;
                mwahSound.play().catch(() => {});
                setTimeout(() => { currentBallImg = ballImg; }, 500);
            }

            // Scoring
            if (ball.x < 0) {
                rightScore++;
                updateScore();
                if (rightScore >= winScore) { endGame('Xavier Wins!'); return; }
                resetBall();
            } else if (ball.x > canvas.width) {
                leftScore++;
                updateScore();
                if (leftScore >= winScore) { endGame('Braden Wins!'); return; }
                resetBall();
            }

            checkPowerUps();
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ballHitCount = 0;
            currentBallImg = ballImg;
            // Random launch angle so ball doesn't go perfectly horizontal
            const angle = (Math.random() * 0.5 - 0.25);
            const dir = Math.random() < 0.5 ? 1 : -1;
            ball.dx = dir * baseSpeed * Math.cos(angle);
            ball.dy = baseSpeed * Math.sin(angle);
        }

        // ================= AI =================
        function moveRightPaddleAI() {
            let aiSpeed, reactionDelay, errorAmount;

            if (aiDifficulty === "easy") {
                aiSpeed = 3.5; reactionDelay = 18; errorAmount = 50;
            } else if (aiDifficulty === "hard") {
                aiSpeed = 6; reactionDelay = 5; errorAmount = 10;
            } else {
                aiSpeed = 4.5; reactionDelay = 12; errorAmount = 25;
            }

            if (aiReactionTimer <= 0) {
                aiTargetY = ball.y + (Math.random() * errorAmount - errorAmount / 2);
                aiReactionTimer = reactionDelay;
            } else {
                aiReactionTimer--;
            }

            const paddleCenter = rightPaddle.y + paddleHeight / 2;

            if (paddleCenter < aiTargetY - 10) rightPaddle.dy = aiSpeed;
            else if (paddleCenter > aiTargetY + 10) rightPaddle.dy = -aiSpeed;
            else rightPaddle.dy = 0;
        }

        // ================= UPDATE =================
        function updatePaddles() {
            leftPaddle.y += leftPaddle.dy;
            rightPaddle.y += rightPaddle.dy;
            leftPaddle.y = Math.max(0, Math.min(canvas.height - paddleHeight, leftPaddle.y));
            rightPaddle.y = Math.max(0, Math.min(canvas.height - paddleHeight, rightPaddle.y));
        }

        function updateScore() {
            scoreElement.textContent = leftScore + ' - ' + rightScore;
        }

        function endGame(winner) {
            gameEnded = true;
            clearInterval(powerUpInterval);
            gameOverText.textContent = winner;
            gameOverDiv.style.display = 'block';
        }

        // ================= DRAW =================
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawCenterLine();
            drawBall();
            drawPaddles();
            drawParticles();
            drawPowerUps();
        }

        // ================= LOOP =================
        function gameLoop() {
            if (!gameEnded) {
                moveRightPaddleAI();
                updateBall();
                updatePaddles();
                updateParticles();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ================= CONTROLS =================
        document.addEventListener('keydown', (e) => {
            if (gameEnded) return;
            if (e.key === 'w' || e.key === 'W') leftPaddle.dy = -7.5;
            if (e.key === 's' || e.key === 'S') leftPaddle.dy = 7.5;
        });

        document.addEventListener('keyup', (e) => {
            if (['w', 'W', 's', 'S'].includes(e.key)) leftPaddle.dy = 0;
        });

        // ================= START =================
        gameLoop();
    </script>
</body>
</html>
