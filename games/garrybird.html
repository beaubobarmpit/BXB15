<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Gassyman</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    #gameCanvas {
      border-radius: 12px;
      border: 2px solid #4a90d9;
      display: block;
      cursor: pointer;
    }
    .stat-pill {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border-radius: 999px;
      padding: 5px 18px;
      font-size: 14px;
      font-weight: 500;
    }
    #startBtn { border-radius: 999px; padding: 5px 22px; font-weight: 600; }
    .game-hint { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 6px; }
  </style>
</head>
<body>
  <div class="d-flex flex-column align-items-center gap-3">
    <div class="d-flex gap-3 align-items-center flex-wrap justify-content-center">
      <span class="stat-pill">Score: <span id="score-display">0</span></span>
      <span class="stat-pill">Best: <span id="best-display">0</span></span>
      <button id="startBtn" class="btn btn-primary btn-sm">Play</button>
    </div>
    <canvas id="gameCanvas" width="380" height="520"></canvas>
    <div class="game-hint">Tap &bull; Click &bull; Space to flap</div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score-display');
    const bestEl = document.getElementById('best-display');
    const startBtn = document.getElementById('startBtn');

    const W = canvas.width, H = canvas.height;
    const GAP = 145, PIPE_W = 52, PIPE_SPEED = 2.4;
    const GRAVITY = 0.38, FLAP = -7.2;
    const BIRD_X = 90, BIRD_SIZE = 52;

    // Remove black background from image using an offscreen canvas
    function removeBlackBg(srcImg, threshold) {
      const oc = document.createElement('canvas');
      oc.width = srcImg.naturalWidth;
      oc.height = srcImg.naturalHeight;
      const octx = oc.getContext('2d');
      octx.drawImage(srcImg, 0, 0);
      const imageData = octx.getImageData(0, 0, oc.width, oc.height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        // If pixel is dark (close to black), make transparent
        if (r < threshold && g < threshold && b < threshold) {
          data[i+3] = 0;
        }
      }
      octx.putImageData(imageData, 0, 0);
      return oc;
    }

      birdCanvas = removeBlackBg(srcImg, 40);
      startGame();

      const r = 6, botY = p.topH + GAP;
      ctx.fillStyle = '#3ea832'; roundRect(p.x, botY, PIPE_W, H - botY - 30, r);
      ctx.fillStyle = '#4ecb3f'; roundRect(p.x - 3, botY, PIPE_W + 6, 22, r);
      ctx.fillStyle = '#3ea832'; roundRect(p.x, 0, PIPE_W, p.topH, r);
      ctx.fillStyle = '#4ecb3f'; roundRect(p.x - 3, p.topH - 22, PIPE_W + 6, 22, r);
      ctx.strokeStyle = '#267a1c'; ctx.lineWidth = 1.5;
      ctx.strokeRect(p.x, botY, PIPE_W, H - botY - 30);
      ctx.strokeRect(p.x, 0, PIPE_W, p.topH);
    }

    function drawBird(y, angle) {
      if (!birdCanvas) return;
      ctx.save();
      ctx.translate(BIRD_X, y);
      ctx.rotate(angle);
      const half = BIRD_SIZE / 2;
      ctx.drawImage(birdCanvas, -half, -half, BIRD_SIZE, BIRD_SIZE);
      ctx.restore();
    }

    function drawScore() {
      ctx.fillStyle = '#fff'; ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 4;
      ctx.fillText(score, W / 2, 48); ctx.shadowBlur = 0;
    }

    function drawOverlay(text, sub) {
      ctx.fillStyle = 'rgba(0,0,0,0.38)'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 32px sans-serif';
      ctx.textAlign = 'center'; ctx.fillText(text, W / 2, H / 2 - 20);
      ctx.font = '16px sans-serif'; ctx.fillStyle = '#eee';
      ctx.fillText(sub, W / 2, H / 2 + 16);
    }

    function checkCollision(p) {
      const r = BIRD_SIZE / 2 - 6;
      if (BIRD_X + r > p.x && BIRD_X - r < p.x + PIPE_W)
        if (bird.y - r < p.topH || bird.y + r > p.topH + GAP) return true;
      return false;
    }

    function die() { state = 'dead'; bird.vy = FLAP * 0.5; }

    function loop() {
      animId = requestAnimationFrame(loop);
      drawSky();
      if (state === 'running') {
        bird.vy += GRAVITY; bird.y += bird.vy;
        bird.angle = Math.min(Math.max(bird.vy * 0.07, -0.5), 1.2);
        if (frame % 85 === 0) addPipe();
        frame++;
        for (let i = pipes.length - 1; i >= 0; i--) {
          pipes[i].x -= PIPE_SPEED;
          if (!pipes[i].scored && pipes[i].x + PIPE_W < BIRD_X) {
            pipes[i].scored = true; score++;
            scoreEl.textContent = score;
            if (score > best) { best = score; bestEl.textContent = best; }
          }
          if (pipes[i].x + PIPE_W < 0) { pipes.splice(i, 1); continue; }
          drawPipe(pipes[i]);
          if (checkCollision(pipes[i])) die();
        }
        drawGround();
        const half = BIRD_SIZE / 2;
        if (bird.y + half >= H - 30 || bird.y - half <= 0) die();
        drawBird(bird.y, bird.angle);
        drawScore();
      } else if (state === 'idle') {
        drawGround(); drawBird(H / 2, 0);
        drawOverlay('Flappy Gassyman', 'Tap / Click / Space to start');
      } else if (state === 'dead') {
        pipes.forEach(drawPipe); drawGround();
        drawBird(bird.y, bird.angle);
        drawOverlay('Game Over  ' + score, 'Tap to play again');
      }
    }

    function startGame() {
      state = 'idle'; bird = initBird(); pipes = []; frame = 0;
      loop();
    }

    canvas.addEventListener('click', flap);
    document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); } });
    startBtn.addEventListener('click', () => { if (state !== 'running') flap(); });
  </script>
</body>
</html>
