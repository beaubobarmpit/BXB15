<!DOCTYPE html>
<html>
<head>
    <title>XAVIER: GALACTIC OVERLORD</title>
    <style>
        body { margin: 0; background: #000; color: #00FFCC; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
        #game-ui { position: absolute; top: 20px; left: 20px; z-index: 10; text-shadow: 2px 2px #000; pointer-events: none; }
        #shop { position: absolute; right: 20px; top: 20px; background: rgba(0,20,20,0.85); padding: 15px; border: 2px solid #00FFCC; border-radius: 5px; width: 250px; box-shadow: 0 0 20px rgba(0,255,204,0.3); }
        .item { display: flex; justify-content: space-between; margin: 10px 0; font-size: 13px; border-bottom: 1px solid #1a3333; padding-bottom: 5px; }
        .key { color: #fff; background: #333; padding: 2px 5px; border-radius: 3px; border: 1px solid #00FFCC; font-weight: bold; }
        .val { color: #ffff00; }
        #dash-bar { width: 100%; height: 5px; background: #222; margin-top: 5px; position: relative; }
        #dash-fill { height: 100%; background: #00FFFF; width: 100%; }
        #death-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; background: rgba(0,0,0,0.9); padding: 40px; border: 5px solid #ff4444; z-index: 100; }
        canvas { display: block; image-rendering: pixelated; } /* Keeps your pixel art sharp */
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div id="loading">CHECKING LOCAL ASSETS...</div>

    <div id="game-ui">
        <div style="font-size: 24px;">CREDITS: <span id="coins" class="val">0</span></div>
        <div style="font-size: 18px;">DISTANCE: <span id="dist" class="val">0</span>ly</div>
        <div style="margin-top:10px;">DASH READY [SPACE]</div>
        <div id="dash-bar"><div id="dash-fill"></div></div>
    </div>

    <div id="shop">
        <div style="text-align: center; font-weight: bold; font-size: 18px; margin-bottom: 10px;">UPGRADE HANGAR</div>
        <div class="item"><span><span class="key">1</span> Hull Shield ($15)</span><span id="l1" class="val">0</span></div>
        <div class="item"><span><span class="key">2</span> Nano-Shrink ($25)</span><span id="l2" class="val">0</span></div>
        <div class="item"><span><span class="key">3</span> Scavenger ($30)</span><span id="l3" class="val">0</span></div>
        <div class="item"><span><span class="key">4</span> Thrusters ($40)</span><span id="l4" class="val">0</span></div>
    </div>

    <div id="death-screen">
        <h1 style="color:#ff4444; font-size: 48px;">MISSION FAILED</h1>
        <p id="final-stats"></p>
        <button onclick="location.reload()" style="background:#00FFCC; border:none; padding:15px 30px; cursor:pointer; font-weight:bold; font-family:inherit;">REDEPLOY XAVIER</button>
    </div>

    <canvas id="ctx"></canvas>

<script>
    const canvas = document.getElementById('ctx');
    const c = canvas.getContext('2d');
    
    // --- ASSET CONFIG ---
    // Switch 'placeholder.png' to your actual filenames once they're ready
    const assets = {
        bg: { src: '../../images/badguy.png', img: new Image() },
        xavier: { src: '../../images/BeautifulXavier.png', img: new Image() },
        coin: { src: '../../images/badguy.png', img: new Image() },
        enemy: { src: '../../images/badguy.png', img: new Image() }
    };

    let assetsLoaded = 0;
    const totalAssets = Object.keys(assets).length;

    Object.values(assets).forEach(asset => {
        asset.img.onload = () => { 
            assetsLoaded++; 
            if(assetsLoaded === totalAssets) start(); 
        };
        asset.img.onerror = () => { 
            // Fallback so the game starts even if files are missing
            console.warn(`Could not load ${asset.src}, using fallback shapes.`);
            assetsLoaded++; 
            if(assetsLoaded === totalAssets) start(); 
        };
        asset.img.src = asset.src;
    });

    let state = {
        coins: 0, dist: 0, active: false, frame: 0,
        keys: {},
        xavier: { x: 0, y: 0, w: 50, h: 50, s: 5, shields: 0, dashCD: 0 },
        entities: [], bgY: 0,
        lvls: { s:0, n:0, sc:0, t:0 }
    };

    function start() {
        document.getElementById('loading').style.display = 'none';
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        state.xavier.x = canvas.width/2;
        state.xavier.y = canvas.height - 150;
        state.active = true;
        loop();
    }

    window.addEventListener('keydown', e => {
        state.keys[e.key.toLowerCase()] = true;
        if(e.key === '1') buy(1); if(e.key === '2') buy(2);
        if(e.key === '3') buy(3); if(e.key === '4') buy(4);
        if(e.code === 'Space' && state.xavier.dashCD <= 0) dash();
    });
    window.addEventListener('keyup', e => state.keys[e.key.toLowerCase()] = false);

    function buy(n) {
        if(!state.active) return;
        if(n===1 && state.coins>=15) { state.coins-=15; state.xavier.shields++; state.lvls.s++; }
        else if(n===2 && state.coins>=25 && state.xavier.w > 20) { state.coins-=25; state.xavier.w-=4; state.xavier.h-=4; state.lvls.n++; }
        else if(n===3 && state.coins>=30) { state.coins-=30; state.lvls.sc++; }
        else if(n===4 && state.coins>=40) { state.coins-=40; state.xavier.s+=1.2; state.lvls.t++; }
        updateUI();
    }

    function dash() {
        state.xavier.dashCD = 180;
        const dashDist = 120;
        if(state.keys['w']) state.xavier.y -= dashDist;
        if(state.keys['s']) state.xavier.y += dashDist;
        if(state.keys['a']) state.xavier.x -= dashDist;
        if(state.keys['d']) state.xavier.x += dashDist;
    }

    function updateUI() {
        document.getElementById('coins').innerText = state.coins;
        document.getElementById('dist').innerText = state.dist;
        document.getElementById('l1').innerText = state.lvls.s;
        document.getElementById('l2').innerText = state.lvls.n;
        document.getElementById('l3').innerText = state.lvls.sc;
        document.getElementById('l4').innerText = state.lvls.t;
    }

    function loop() {
        if(!state.active) return;
        state.frame++;
        if(state.frame % 60 === 0) { state.dist++; updateUI(); }
        
        if(state.xavier.dashCD > 0) {
            state.xavier.dashCD--;
            document.getElementById('dash-fill').style.width = ((180 - state.xavier.dashCD)/180 * 100) + "%";
        }

        // Draw Background
        state.bgY += 2;
        if(state.bgY >= canvas.height) state.bgY = 0;
        
        if(assets.bg.img.complete && assets.bg.img.naturalWidth !== 0) {
            c.drawImage(assets.bg.img, 0, state.bgY, canvas.width, canvas.height);
            c.drawImage(assets.bg.img, 0, state.bgY - canvas.height, canvas.width, canvas.height);
        } else {
            c.fillStyle = '#050505'; c.fillRect(0,0,canvas.width,canvas.height);
        }

        // Movement
        let x = state.xavier;
        if(state.keys['w']) x.y -= x.s; if(state.keys['s']) x.y += x.s;
        if(state.keys['a']) x.x -= x.s; if(state.keys['d']) x.x += x.s;
        x.x = Math.max(0, Math.min(canvas.width - x.w, x.x));
        x.y = Math.max(0, Math.min(canvas.height - x.h, x.y));

        // Draw Player
        if(x.shields > 0) {
            c.strokeStyle = '#00FFFF'; c.lineWidth = 2;
            c.beginPath(); c.arc(x.x + x.w/2, x.y + x.h/2, x.w, 0, Math.PI*2); c.stroke();
        }
        if(assets.xavier.img.complete && assets.xavier.img.naturalWidth !== 0) {
            c.drawImage(assets.xavier.img, x.x, x.y, x.w, x.h);
        } else {
            c.fillStyle = '#00FFCC'; c.fillRect(x.x, x.y, x.w, x.h);
            c.fillStyle = 'black'; c.font = '10px Arial'; c.fillText('XAVIER', x.x+5, x.y+20);
        }

        // Entity Logic
        if(state.frame % Math.max(10, 40 - Math.floor(state.dist/5)) === 0) {
            let isCoin = Math.random() < (0.2 + state.lvls.sc * 0.05);
            state.entities.push({
                x: Math.random() * (canvas.width - 40), y: -50,
                w: isCoin ? 25 : 45, h: isCoin ? 25 : 45,
                type: isCoin ? 'c' : 'e',
                speed: Math.random() * 2 + 3 + (state.dist/15)
            });
        }

        for(let i=state.entities.length-1; i>=0; i--) {
            let e = state.entities[i];
            e.y += e.speed;
            
            if(e.type === 'c') {
                if(assets.coin.img.complete && assets.coin.img.naturalWidth !== 0) {
                    c.drawImage(assets.coin.img, e.x, e.y, e.w, e.h);
                } else {
                    c.fillStyle = 'yellow'; c.beginPath(); c.arc(e.x+12, e.y+12, 12, 0, Math.PI*2); c.fill();
                }
            } else {
                if(assets.enemy.img.complete && assets.enemy.img.naturalWidth !== 0) {
                    c.drawImage(assets.enemy.img, e.x, e.y, e.w, e.h);
                } else {
                    c.fillStyle = 'red'; c.fillRect(e.x, e.y, e.w, e.h);
                }
            }

            // Collision Detection
            if(x.x < e.x + e.w && x.x + x.w > e.x && x.y < e.y + e.h && x.y + x.h > e.y) {
                if(e.type === 'c') {
                    state.coins++; updateUI(); state.entities.splice(i, 1);
                } else {
                    if(x.shields > 0) {
                        x.shields--; state.lvls.s--; updateUI(); state.entities.splice(i, 1);
                    } else {
                        state.active = false;
                        document.getElementById('death-screen').style.display = 'block';
                        document.getElementById('final-stats').innerHTML = `XAVIER DRIFTED FOR ${state.dist} LIGHTYEARS<br>AND EARNED ${state.coins} CREDITS.`;
                    }
                }
                continue;
            }
            if(e.y > canvas.height) state.entities.splice(i, 1);
        }

        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
