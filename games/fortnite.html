<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        .game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background-image: url('jort.jpg');
            background-size: cover;
            overflow: hidden;
            border: 3px solid #fff;
        }
        .image {
            position: absolute;
            height: 100%;
        }
        #happyVoss {
            animation: slideIn 5s forwards;
        }
        @keyframes slideIn {
            from { right: -800px; }
            to { right: 0; }
        }
        #nadVoss {
            display: none;
            width: 100%;
            height: 100%;
        }
        #workImage {
            display: none;
            width: 100%;
            height: 100%;
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            z-index: 10;
        }
        .result {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            font-size: 36px;
            display: none;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="ui">
            Time: <span id="timer">5</span>s | Press SPACE to change to WORK
        </div>
        <img id="happyVoss" class="image" src="happyVoss.png" alt="Happy">
        <img id="nadVoss" class="image" src="nadVoss.png" alt="Nad">
        <img id="workImage" class="image" src="WORK.png" alt="Work">
        <div class="result" id="result"></div>
    </div>

    <script>
        let gameActive = true;
        let timeLeft = 5;
        const timerDisplay = document.getElementById('timer');
        const resultDisplay = document.getElementById('result');
        const happyVoss = document.getElementById('happyVoss');
        const nadVoss = document.getElementById('nadVoss');
        const workImage = document.getElementById('workImage');

        const timer = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = timeLeft;
            if (timeLeft <= 0) {
                endGame(false);
            }
        }, 1000);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && gameActive) {
                e.preventDefault();
                endGame(true);
            }
        });

        function endGame(win) {
            gameActive = false;
            clearInterval(timer);
            happyVoss.style.display = 'none';
            
            if (win) {
                workImage.style.display = 'block';
                resultDisplay.textContent = 'YOU WIN!';
                resultDisplay.style.color = '#00ff00';
            } else {
                nadVoss.style.display = 'block';
                resultDisplay.textContent = 'YOU LOSE!';
                resultDisplay.style.color = '#ff0000';
            }
            resultDisplay.style.display = 'block';
        }
    </script>
</body>
</html>
