<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher vs. Paperwork Monster</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Special+Elite&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --chalk: #f5f0e8;
      --red-pen: #e63946;
      --stamp-ink: #4a1c96;
      --desk-wood: #7b4f2e;
      --paper-yellow: #fef9c3;
      --paper-white: #fdfaf2;
      --monster-green: #2d6a4f;
      --ink-blue: #1d3557;
      --blackboard: #1a2e1a;
      --gold: #f4a261;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--blackboard);
      font-family: 'Special Elite', cursive;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* CHALKBOARD TEXTURE */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 28px,
        rgba(255,255,255,0.03) 28px,
        rgba(255,255,255,0.03) 29px
      );
      pointer-events: none;
      z-index: 0;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
    }

    /* TITLE */
    #title-bar {
      text-align: center;
      padding: 8px 0 4px;
    }
    #title-bar h1 {
      font-family: 'Permanent Marker', cursive;
      color: var(--chalk);
      font-size: clamp(1.2rem, 3vw, 2rem);
      text-shadow: 2px 2px 0 var(--red-pen), 4px 4px 8px rgba(0,0,0,0.5);
      letter-spacing: 2px;
    }

    /* HUD */
    #hud {
      width: 95%;
      max-width: 800px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 12px;
      background: rgba(0,0,0,0.4);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      margin-bottom: 6px;
    }
    .hud-label {
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      color: var(--chalk);
      letter-spacing: 1px;
    }
    .hud-val {
      font-family: 'VT323', monospace;
      font-size: 1.4rem;
    }

    /* HP BARS */
    .hp-bar-wrap { width: 140px; }
    .hp-bar {
      height: 14px;
      border-radius: 2px;
      border: 2px solid rgba(255,255,255,0.3);
      overflow: hidden;
      background: #111;
    }
    .hp-fill {
      height: 100%;
      transition: width 0.3s ease;
      border-radius: 1px;
    }
    #teacher-hp-fill { background: #52b788; }
    #monster-hp-fill { background: var(--red-pen); }

    /* BATTLEFIELD */
    #battlefield {
      width: 95%;
      max-width: 800px;
      flex: 1;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding-bottom: 10px;
    }

    /* DESK */
    #desk-zone {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
    }

    /* TEACHER CHARACTER */
    #teacher {
      width: clamp(80px, 14vw, 130px);
      height: clamp(80px, 14vw, 130px);
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #f5f0e8;
      box-shadow: 0 0 0 4px rgba(82,183,136,0.4), 0 4px 16px rgba(0,0,0,0.7);
      cursor: default;
      user-select: none;
      transition: transform 0.1s;
      animation: teacher-idle 3s ease-in-out infinite;
      position: relative;
      background: #000;
    }
    #teacher.attacking {
      animation: teacher-attack 0.4s ease-out forwards !important;
    }
    @keyframes teacher-idle {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%       { transform: translateY(-6px) rotate(2deg); }
    }
    @keyframes teacher-attack {
      0%   { transform: translateX(0) scale(1); }
      40%  { transform: translateX(60px) scale(1.2); }
      70%  { transform: translateX(40px) scale(1.1); }
      100% { transform: translateX(0) scale(1); }
    }
    #teacher.hurt {
      animation: hurt-flash 0.5s ease !important;
    }
    @keyframes hurt-flash {
      0%,100% { filter: none; box-shadow: 0 0 0 4px rgba(82,183,136,0.4), 0 4px 16px rgba(0,0,0,0.7); }
      30%     { filter: brightness(1.8) saturate(3); box-shadow: 0 0 30px red, 0 0 0 4px red; }
    }

    /* DESK VISUAL */
    #desk {
      background: linear-gradient(180deg, #9b6f47, var(--desk-wood));
      border: 3px solid #5a3010;
      border-radius: 4px 4px 6px 6px;
      padding: 6px 14px;
      position: relative;
      box-shadow: 0 6px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .desk-label {
      font-family: 'VT323', monospace;
      color: var(--chalk);
      font-size: 0.85rem;
      opacity: 0.7;
      text-align: center;
    }
    /* Papers on desk */
    .desk-paper {
      position: absolute;
      background: var(--paper-white);
      border: 1px solid #ccc;
      border-radius: 1px;
      opacity: 0.8;
    }

    /* WEAPON BUTTONS */
    #weapons {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .weapon-btn {
      font-family: 'Permanent Marker', cursive;
      font-size: clamp(0.75rem, 2vw, 0.95rem);
      padding: 6px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      box-shadow: 0 4px 0 rgba(0,0,0,0.4);
      letter-spacing: 1px;
    }
    .weapon-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.4); }
    .weapon-btn:hover  { filter: brightness(1.15); }

    #btn-stamp {
      background: var(--stamp-ink);
      color: white;
    }
    #btn-redpen {
      background: var(--red-pen);
      color: white;
    }
    #btn-ruler {
      background: var(--gold);
      color: var(--ink-blue);
    }
    .weapon-btn .cooldown-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 3px;
      background: rgba(255,255,255,0.5);
      border-radius: 0 0 4px 4px;
      transition: width 0.05s linear;
    }
    .weapon-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* MONSTER */
    #monster-zone {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
    }
    #monster {
      position: relative;
      cursor: pointer;
      animation: monster-idle 2s ease-in-out infinite;
    }
    #monster:hover { filter: brightness(1.08); }
    @keyframes monster-idle {
      0%,100% { transform: scale(1) rotate(0deg); }
      33%     { transform: scale(1.03) rotate(1.5deg); }
      66%     { transform: scale(0.97) rotate(-1.5deg); }
    }
    #monster.hurt-anim {
      animation: monster-hurt 0.5s ease !important;
    }
    @keyframes monster-hurt {
      0%   { transform: scale(1) translateX(0); filter: none; }
      20%  { transform: scale(1.1) translateX(-12px); filter: brightness(4) saturate(0); }
      50%  { transform: scale(0.92) translateX(10px); filter: brightness(2) sepia(1) hue-rotate(-20deg); }
      100% { transform: scale(1) translateX(0); filter: none; }
    }
    #monster-svg {
      width: clamp(130px, 22vw, 200px);
      height: auto;
      display: block;
    }
    /* floating papers around monster */
    .m-paper {
      position: absolute;
      width: clamp(18px, 3.5vw, 30px);
      height: clamp(22px, 4.5vw, 38px);
      background: var(--paper-white);
      border: 1px solid #bbb;
      border-radius: 1px;
      overflow: hidden;
      animation: paper-orbit 2s ease-in-out infinite;
      box-shadow: 1px 2px 4px rgba(0,0,0,0.4);
      pointer-events: none;
    }
    .m-paper::before {
      content: '';
      position: absolute;
      inset: 3px;
      background: repeating-linear-gradient(
        180deg,
        transparent 0px, transparent 3px,
        rgba(100,100,200,0.18) 3px, rgba(100,100,200,0.18) 4px
      );
    }
    .m-paper .paper-icon {
      position: absolute;
      top: 1px; right: 1px;
      font-size: 0.55rem;
      opacity: 0.7;
    }
    @keyframes paper-orbit {
      0%,100% { transform: translate(0,0) rotate(var(--r,0deg)); }
      50%     { transform: translate(var(--ox,4px), var(--oy,-6px)) rotate(calc(var(--r,0deg) + 8deg)); }
    }

    /* MONSTER NAME */
    .monster-name {
      font-family: 'Permanent Marker', cursive;
      color: var(--red-pen);
      font-size: clamp(0.7rem, 2vw, 1rem);
      text-shadow: 1px 1px 0 #000;
      margin-top: 4px;
      text-align: center;
    }

    /* PROJECTILE EFFECTS */
    .projectile {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      font-size: 1.8rem;
      transition: none;
    }
    .stamp-hit {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      font-family: 'Permanent Marker', cursive;
      font-size: 1.4rem;
      color: var(--stamp-ink);
      text-shadow: 0 0 8px rgba(74,28,150,0.8);
      animation: stamp-fade 0.8s ease-out forwards;
    }
    .redpen-hit {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      font-family: 'Permanent Marker', cursive;
      font-size: 1.2rem;
      color: var(--red-pen);
      text-shadow: 0 0 8px rgba(230,57,70,0.8);
      animation: stamp-fade 0.8s ease-out forwards;
    }
    @keyframes stamp-fade {
      0%   { opacity: 1; transform: scale(0.5) rotate(-10deg); }
      30%  { opacity: 1; transform: scale(1.3) rotate(5deg); }
      100% { opacity: 0; transform: scale(1) translateY(-30px) rotate(0deg); }
    }

    /* MONSTER ATTACK PROJECTILE */
    .paper-attack {
      position: fixed;
      pointer-events: none;
      z-index: 998;
      font-size: 1.5rem;
      animation: paper-fly 0.7s ease-in forwards;
    }
    @keyframes paper-fly {
      0%   { opacity: 1; transform: scale(1) rotate(0deg); }
      100% { opacity: 0; transform: scale(0.5) rotate(720deg) translateY(40px); }
    }

    /* DAMAGE NUMBERS */
    .dmg-num {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      font-family: 'VT323', monospace;
      font-size: 1.8rem;
      font-weight: bold;
      animation: dmg-rise 1s ease-out forwards;
    }
    @keyframes dmg-rise {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
    }

    /* BATTLEFIELD FLOOR */
    #floor {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 30px;
      background: linear-gradient(180deg, #5a3010, #3d1f09);
      border-top: 3px solid #7b4f2e;
    }

    /* FLOATING PAPERS BACKGROUND */
    .bg-paper {
      position: fixed;
      pointer-events: none;
      font-size: 1.2rem;
      opacity: 0.08;
      animation: drift linear infinite;
      z-index: 0;
    }
    @keyframes drift {
      0%   { transform: translateY(100vh) rotate(0deg); }
      100% { transform: translateY(-20vh) rotate(360deg); }
    }

    /* PHASE LABEL */
    #phase-label {
      font-family: 'VT323', monospace;
      font-size: 1rem;
      color: var(--red-pen);
      text-align: center;
      height: 20px;
      transition: all 0.3s;
    }

    /* STATUS MSG */
    #status-msg {
      font-family: 'VT323', monospace;
      font-size: 1.2rem;
      color: var(--gold);
      text-align: center;
      padding: 2px;
      height: 28px;
      animation: msg-pulse 0.5s ease-out;
    }
    @keyframes msg-pulse {
      0%   { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* GAME OVER / WIN SCREEN */
    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    #overlay.active { display: flex; }
    #overlay h2 {
      font-family: 'Permanent Marker', cursive;
      font-size: clamp(2rem, 6vw, 3.5rem);
      margin-bottom: 16px;
    }
    #overlay p {
      font-family: 'Special Elite', cursive;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: var(--chalk);
      margin-bottom: 24px;
      max-width: 500px;
    }
    #restart-btn {
      font-family: 'Permanent Marker', cursive;
      font-size: 1.3rem;
      padding: 12px 32px;
      background: var(--red-pen);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 6px 0 #8b0000;
      transition: all 0.15s;
    }
    #restart-btn:hover  { filter: brightness(1.2); }
    #restart-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #8b0000; }

    /* SCORE */
    #score-display {
      font-family: 'VT323', monospace;
      font-size: 1.3rem;
      color: var(--gold);
    }
  </style>
</head>
<body>

<!-- Background drifting papers -->
<div id="bg-papers"></div>

<div id="overlay">
  <h2 id="overlay-title"></h2>
  <p id="overlay-msg"></p>
  <div id="score-display"></div>
  <button id="restart-btn" class="mt-3">📋 Try Again!</button>
</div>

  <div id="title-bar">
    <h1>📚 TEACHER vs. PAPERWORK MONSTER 📚</h1>

        <span class="hud-val" id="teacher-hp-text" style="color:#52b788">100 / 100</span>
      </div>
    </div>
    <div class="d-flex flex-column align-items-center">
      <span class="hud-label" id="score-hud" style="color:var(--gold)">SCORE: 0</span>

    </div>
    <div class="d-flex flex-column align-items-end">
      <span class="hud-label">📄 MONSTER</span>
      <div class="hp-bar-wrap">
        <div class="hp-bar"><div class="hp-fill" id="monster-hp-fill" style="width:100%"></div></div>
        <span class="hud-val" id="monster-hp-text" style="color:var(--red-pen)">150 / 150</span>
      </div>
    </div>
  </div>

  <div id="phase-label">PHASE 1 — "The Mild Pile"</div>

            <circle id="pupil-l" cx="80" cy="100" r="8" fill="#cc0000"/>
            <circle id="pupil-r" cx="124" cy="100" r="8" fill="#cc0000"/>
            <circle cx="77" cy="96" r="3" fill="#ff4400"/>
            <circle cx="121" cy="96" r="3" fill="#ff4400"/>
            <circle cx="82" cy="96" r="2" fill="#fff"/>
            <circle cx="126" cy="96" r="2" fill="#fff"/>
            <!-- nose -->
            <ellipse cx="100" cy="116" rx="8" ry="5" fill="#8aad50" stroke="#3a5a20" stroke-width="1.5"/>
            <circle cx="96" cy="117" r="2.5" fill="#3a5a20"/>
            <circle cx="104" cy="117" r="2.5" fill="#3a5a20"/>
            <!-- angry mouth -->
            <path id="monster-mouth" d="M68 138 Q100 128 132 138" fill="none" stroke="#1a2e0a" stroke-width="3" stroke-linecap="round"/>
            <!-- teeth -->
            <g id="monster-teeth">
              <polygon points="76,138 82,138 79,150" fill="white" stroke="#aaa" stroke-width="0.5"/>
              <polygon points="86,136 92,136 89,149" fill="white" stroke="#aaa" stroke-width="0.5"/>
              <polygon points="96,134 102,134 99,148" fill="white" stroke="#aaa" stroke-width="0.5"/>
              <polygon points="106,134 112,134 109,149" fill="white" stroke="#aaa" stroke-width="0.5"/>
              <polygon points="116,136 122,136 119,150" fill="white" stroke="#aaa" stroke-width="0.5"/>
              <polygon points="126,138 132,138 129,150" fill="white" stroke="#aaa" stroke-width="0.5"/>
            </g>
            <!-- claws -->
            <g id="claws-l">
              <path d="M42 130 Q28 118 32 105" fill="none" stroke="#3a5a20" stroke-width="3" stroke-linecap="round"/>
              <path d="M42 138 Q22 130 24 116" fill="none" stroke="#3a5a20" stroke-width="3" stroke-linecap="round"/>
              <path d="M44 146 Q28 145 26 130" fill="none" stroke="#3a5a20" stroke-width="3" stroke-linecap="round"/>
            </g>
            <g id="claws-r">
              <path d="M158 130 Q172 118 168 105" fill="none" stroke="#3a5a20" stroke-width="3" stroke-linecap="round"/>
              <path d="M158 138 Q178 130 176 116" fill="none" stroke="#3a5a20" stroke-width="3" stroke-linecap="round"/>
              <path d="M156 146 Q172 145 174 130" fill="none" stroke="#3a5a20" stroke-width="3" stroke-linecap="round"/>
            </g>
            <!-- horns -->
            <path id="horn-l" d="M62 52 Q50 20 70 10 Q75 35 80 50" fill="#8bc34a" stroke="#3a5a20" stroke-width="2"/>
            <path id="horn-r" d="M138 52 Q150 20 130 10 Q125 35 120 50" fill="#8bc34a" stroke="#3a5a20" stroke-width="2"/>
            <!-- scar -->
            <path d="M108 88 L114 108" stroke="#8b0000" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
            <!-- paper stuck to face -->
            <g transform="rotate(15,155,75)">
              <rect x="148" y="60" width="22" height="28" fill="#fdfaf2" stroke="#ccc" stroke-width="1" rx="1"/>
              <line x1="151" y1="66" x2="167" y2="66" stroke="#aac" stroke-width="0.8"/>
              <line x1="151" y1="70" x2="167" y2="70" stroke="#aac" stroke-width="0.8"/>
              <line x1="151" y1="74" x2="167" y2="74" stroke="#aac" stroke-width="0.8"/>
              <text x="158" y="86" font-size="7" text-anchor="middle" fill="#c00" font-family="serif">✗</text>
            </g>
          </g>
          <!-- drool -->
          <path id="drool" d="M90 150 Q88 165 90 175" fill="none" stroke="rgba(150,220,100,0.8)" stroke-width="4" stroke-linecap="round"/>

      </div>
      <div class="monster-name" id="monster-name">📋 FORM-ZILLA</div>
      <div id="phase-badge" class="badge bg-danger mt-1" style="font-family:'VT323',monospace;font-size:0.9rem">Phase 1</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ─── GAME STATE ───────────────────────────────────────────────────────────────
const TEACHER_MAX_HP = 100;
const MONSTER_PHASES = [
  { name: "FORM-ZILLA",         label: "Phase 1 — The Mild Pile",    hp: 150, atk: 8,  atkInterval: 2800, papers: 9,  color: "#e63946" },
  { name: "SPREAD-SHEETAN",     label: "Phase 2 — Spreadsheet Surge", hp: 200, atk: 14, atkInterval: 2200, papers: 12, color: "#f4a261" },
  { name: "PERMISSION-SLIPPER", label: "Phase 3 — THE SLIP KING",     hp: 280, atk: 20, atkInterval: 1600, papers: 16, color: "#8338ec" },
];

let state = {};

function initGame() {
  state = {
    teacherHp: TEACHER_MAX_HP,
    monsterHp: MONSTER_PHASES[0].hp,
    wave: 0,
    score: 0,
    gameOver: false,
    monsterAtkTimer: null,
    cooldowns: { stamp: false, redpen: false, ruler: false },
  };
  buildMonster();
  updateHUD();
  setStatus("Fight back! Use your weapons! 🖊️");
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('phase-label').textContent = MONSTER_PHASES[0].label;
  document.getElementById('wave-hud').textContent = `WAVE ${state.wave + 1}`;
  startMonsterAttacks();
}

// ─── BUILD MONSTER ────────────────────────────────────────────────────────────
const PAPER_ICONS = ['📋','📄','📊','📑','🗂️','📝','🗒️','📃'];

const PHASE_VISUALS = [
  { headColor:'#c8d8b0', browColor:'#7aad40', strokeColor:'#3a5a20', eyeColor:'#cc0000', hornColor:'#8bc34a', mouthPath:'M68 138 Q100 128 132 138' },
  { headColor:'#d4a0a0', browColor:'#c04040', strokeColor:'#7a1010', eyeColor:'#ff6600', hornColor:'#e05050', mouthPath:'M65 140 Q100 122 135 140' },
  { headColor:'#9966cc', browColor:'#5500aa', strokeColor:'#330066', eyeColor:'#ffdd00', hornColor:'#440088', mouthPath:'M62 142 Q100 118 138 142' },
];

function buildMonster() {
  const phase = MONSTER_PHASES[state.wave];
  const vis = PHASE_VISUALS[state.wave];
  const m = document.getElementById('monster');
  m.querySelectorAll('.m-paper').forEach(e => e.remove());

  // update SVG face colors for this phase
  const svg = document.getElementById('monster-svg');
  svg.querySelector('ellipse[rx="62"]').setAttribute('fill', vis.headColor);
  svg.querySelector('ellipse[rx="62"]').setAttribute('stroke', vis.strokeColor);
  svg.querySelector('#brow-ridge').setAttribute('fill', vis.browColor);
  svg.querySelector('#brow-ridge').setAttribute('stroke', vis.strokeColor);
  svg.querySelectorAll('#claws-l path, #claws-r path').forEach(p => p.setAttribute('stroke', vis.strokeColor));
  svg.querySelectorAll('#horn-l, #horn-r').forEach(p => { p.setAttribute('fill', vis.hornColor); p.setAttribute('stroke', vis.strokeColor); });
  svg.querySelector('ellipse[rx="8"][ry="5"]').setAttribute('fill', vis.browColor);
  svg.querySelector('#monster-mouth').setAttribute('d', vis.mouthPath);

  // per-phase eye glow
  svg.querySelectorAll('#pupil-l, #pupil-r').forEach(c => c.setAttribute('fill', vis.eyeColor));

  // phase 2: wider brows (angrier)
  if (state.wave >= 1) {
    svg.querySelector('#brow-l').setAttribute('y1','78'); svg.querySelector('#brow-l').setAttribute('y2','66');
    svg.querySelector('#brow-r').setAttribute('y1','66'); svg.querySelector('#brow-r').setAttribute('y2','78');
    svg.querySelector('#brow-l').setAttribute('stroke-width','6');
    svg.querySelector('#brow-r').setAttribute('stroke-width','6');
  }
  // phase 3: even more extreme
  if (state.wave >= 2) {
    svg.querySelector('#brow-l').setAttribute('y1','74'); svg.querySelector('#brow-l').setAttribute('y2','60');
    svg.querySelector('#brow-r').setAttribute('y1','60'); svg.querySelector('#brow-r').setAttribute('y2','74');
    svg.querySelector('#brow-l').setAttribute('stroke-width','8');
    svg.querySelector('#brow-r').setAttribute('stroke-width','8');
    svg.querySelector('#drool').setAttribute('stroke','rgba(200,100,255,0.9)');
  }

  // orbiting papers
  const count = phase.papers;
  const mEl = document.getElementById('monster');
  const radius = 80;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'm-paper';
    const angle = (i / count) * Math.PI * 2;
    const px = Math.cos(angle) * radius * (0.7 + Math.random()*0.5);
    const py = Math.sin(angle) * radius * (0.4 + Math.random()*0.4);
    const rot = (Math.random() * 40 - 20) + 'deg';
    const delay = (Math.random() * 2).toFixed(2) + 's';
    const duration = (1.2 + Math.random() * 1.2).toFixed(2) + 's';
    p.style.cssText = `left:calc(50% + ${px}px);top:calc(40% + ${py}px);--r:${rot};--ox:${(Math.random()*10-5).toFixed(1)}px;--oy:${(Math.random()*-12-4).toFixed(1)}px;animation-delay:${delay};animation-duration:${duration};z-index:${i%2===0?1:15};`;
    const icon = document.createElement('div');
    icon.className = 'paper-icon';
    icon.textContent = PAPER_ICONS[i % PAPER_ICONS.length];
    p.appendChild(icon);
    if (i % 3 === 1) p.style.background = 'var(--paper-yellow)';
    if (i % 3 === 2) p.style.background = '#fce4ec';
    mEl.appendChild(p);
  }

  document.getElementById('monster-name').textContent = `📋 ${phase.name}`;
  document.getElementById('phase-badge').textContent = `Phase ${state.wave + 1}`;
  document.getElementById('phase-badge').style.background = phase.color;
  document.getElementById('phase-label').textContent = phase.label;
}

// ─── MONSTER ATTACKS ──────────────────────────────────────────────────────────
function startMonsterAttacks() {
  clearInterval(state.monsterAtkTimer);
  const phase = MONSTER_PHASES[state.wave];
  state.monsterAtkTimer = setInterval(() => {
    if (state.gameOver) return;
    monsterAttack(phase.atk);
  }, phase.atkInterval);
}

function monsterAttack(dmg) {
  // variation
  const d = dmg + Math.floor(Math.random() * 6) - 3;
  state.teacherHp = Math.max(0, state.teacherHp - d);
  updateHUD();

  // projectile from monster to teacher
  fireProjectile('monster-zone', 'desk-zone', '📄');
  setTimeout(() => {
    showDamage('desk-zone', `-${d}`, '#e63946');
    animateTeacher('hurt');
  }, 380);

  const msgs = [
    "📄 A permission slip hits you!", "📋 Buried in forms!",
    "📊 Spreadsheet SLAP!", "📑 Form barrage!",
    "🗂️ Filing cabinet incoming!", "📝 Red tape entangles you!"
  ];
  setStatus(msgs[Math.floor(Math.random() * msgs.length)]);

  if (state.teacherHp <= 0) endGame(false);
}

// ─── PLAYER ATTACKS ───────────────────────────────────────────────────────────
const WEAPONS = {
  stamp:  { dmg: [18, 24], emoji: '📮', hitWord: 'APPROVED!', color: '#4a1c96', cooldown: 1200 },
  redpen: { dmg: [30, 42], emoji: '🖊️', hitWord: 'WRONG!',    color: '#e63946', cooldown: 2000 },
  ruler:  { dmg: [44, 58], emoji: '📏', hitWord: 'RULED!',    color: '#f4a261', cooldown: 3200 },
};

function playerAttack(weapon) {
  if (state.gameOver || state.cooldowns[weapon]) return;

  const w = WEAPONS[weapon];
  const dmg = w.dmg[0] + Math.floor(Math.random() * (w.dmg[1] - w.dmg[0]));
  state.monsterHp = Math.max(0, state.monsterHp - dmg);
  state.score += dmg;
  updateHUD();

  // FX
  fireProjectile('desk-zone', 'monster-zone', w.emoji);
  setTimeout(() => {
    showHitWord('monster-zone', w.hitWord, w.color);
    showDamage('monster-zone', `-${dmg}`, w.color);
    animateMonster();
    removeMonsterPaper();
  }, 320);

  animateTeacher('attacking');
  startCooldown(weapon, w.cooldown);

  const msgs = [
    `📮 STAMPED with authority! -${dmg} HP`,
    `🖊️ Red-penned into oblivion! -${dmg} HP`,
    `📏 Ruler smackdown! -${dmg} HP`,
    `✏️ Marked INCORRECT! -${dmg} HP`,
  ];
  setStatus(msgs[Math.floor(Math.random() * msgs.length)]);

  if (state.monsterHp <= 0) nextPhaseOrWin();
}

function removeMonsterPaper() {
  const papers = document.querySelectorAll('#monster .m-paper');
  if (papers.length > 0) {
    const p = papers[Math.floor(Math.random() * papers.length)];
    p.style.transition = 'all 0.3s';
    p.style.transform = 'scale(0) rotate(180deg)';
    p.style.opacity = '0';
    setTimeout(() => p.remove(), 300);
  }
}

// ─── PHASE / WIN ──────────────────────────────────────────────────────────────
function nextPhaseOrWin() {
  clearInterval(state.monsterAtkTimer);
  if (state.wave < MONSTER_PHASES.length - 1) {
    state.wave++;
    state.monsterHp = MONSTER_PHASES[state.wave].hp;
    setStatus(`⚠️ PHASE ${state.wave + 1}! ${MONSTER_PHASES[state.wave].name} APPEARS!`);
    buildMonster();
    updateHUD();
    setTimeout(startMonsterAttacks, 1200);
  } else {
    endGame(true);
  }
}

function endGame(win) {
  state.gameOver = true;
  clearInterval(state.monsterAtkTimer);
  const ov = document.getElementById('overlay');
  ov.classList.add('active');
  if (win) {
    document.getElementById('overlay-title').textContent = '🏆 YOU WIN!';
    document.getElementById('overlay-title').style.color = '#52b788';
    document.getElementById('overlay-msg').textContent = 'The Paperwork Monster has been DEFEATED! All forms are stamped. All permission slips signed. Peace reigns in the classroom… for now.';
  } else {
    document.getElementById('overlay-title').textContent = '📚 BURIED IN PAPERWORK';
    document.getElementById('overlay-title').style.color = '#e63946';
    document.getElementById('overlay-msg').textContent = 'The monster\'s forms have overwhelmed you. The desk is buried. But a good teacher never gives up — try again!';
  }
  document.getElementById('score-display').textContent = `Final Score: ${state.score}`;
}

// ─── COOLDOWN SYSTEM ─────────────────────────────────────────────────────────
function startCooldown(weapon, ms) {
  state.cooldowns[weapon] = true;
  const btn = document.getElementById(`btn-${weapon}`);
  const bar = document.getElementById(`cd-${weapon}`);
  btn.disabled = true;
  bar.style.width = '100%';
  const start = Date.now();
  const tick = setInterval(() => {
    const pct = Math.max(0, 1 - (Date.now() - start) / ms);
    bar.style.width = (pct * 100) + '%';
    if (pct <= 0) {
      clearInterval(tick);
      state.cooldowns[weapon] = false;
      btn.disabled = false;
      bar.style.width = '0%';
    }
  }, 30);
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function updateHUD() {
  const phase = MONSTER_PHASES[state.wave];
  const tPct = (state.teacherHp / TEACHER_MAX_HP) * 100;
  const mPct = (state.monsterHp / phase.hp) * 100;

  document.getElementById('teacher-hp-fill').style.width = tPct + '%';
  document.getElementById('teacher-hp-text').textContent = `${state.teacherHp} / ${TEACHER_MAX_HP}`;
  document.getElementById('monster-hp-fill').style.width = mPct + '%';
  document.getElementById('monster-hp-text').textContent = `${state.monsterHp} / ${phase.hp}`;
  document.getElementById('score-hud').textContent = `SCORE: ${state.score}`;
  document.getElementById('wave-hud').textContent = `WAVE ${state.wave + 1}`;

  // Color HP
  const tc = tPct > 50 ? '#52b788' : tPct > 25 ? '#f4a261' : '#e63946';
  document.getElementById('teacher-hp-fill').style.background = tc;
}

function setStatus(msg) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'msg-pulse 0.4s ease-out';
}

// ─── ANIMATIONS ───────────────────────────────────────────────────────────────
function animateTeacher(cls) {
  const t = document.getElementById('teacher');
  t.classList.remove('attacking', 'hurt');
  void t.offsetWidth;
  t.classList.add(cls);
  setTimeout(() => t.classList.remove(cls), 500);
}

function animateMonster() {
  const m = document.getElementById('monster');
  m.classList.remove('hurt-anim');
  void m.offsetWidth;
  m.classList.add('hurt-anim');
  setTimeout(() => m.classList.remove('hurt-anim'), 500);
}

// ─── PROJECTILE FX ───────────────────────────────────────────────────────────
function getCenter(id) {
  const el = document.getElementById(id);
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

function fireProjectile(fromId, toId, emoji) {
  const from = getCenter(fromId);
  const to   = getCenter(toId);
  const el = document.createElement('div');
  el.className = 'projectile';
  el.textContent = emoji;
  el.style.left = from.x + 'px';
  el.style.top  = from.y + 'px';
  document.body.appendChild(el);

  const dur = 350;
  const start = performance.now();
  function step(now) {
    const p = Math.min(1, (now - start) / dur);
    const ease = p < 0.5 ? 2 * p * p : -1 + (4 - 2 * p) * p;
    const x = from.x + (to.x - from.x) * ease;
    const y = from.y + (to.y - from.y) * ease - Math.sin(Math.PI * p) * 60;
    const rot = p * 360;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    el.style.transform = `translate(-50%,-50%) rotate(${rot}deg) scale(${1 - p * 0.3})`;
    if (p < 1) requestAnimationFrame(step);
    else el.remove();
  }
  requestAnimationFrame(step);
}

function showHitWord(zoneId, word, color) {
  const pos = getCenter(zoneId);
  const el = document.createElement('div');
  el.className = 'stamp-hit';
  el.textContent = word;
  el.style.color = color;
  el.style.left = (pos.x - 40) + 'px';
  el.style.top  = (pos.y - 30) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function showDamage(zoneId, text, color) {
  const pos = getCenter(zoneId);
  const el = document.createElement('div');
  el.className = 'dmg-num';
  el.textContent = text;
  el.style.color = color;
  el.style.left = (pos.x + (Math.random() * 40 - 20)) + 'px';
  el.style.top  = (pos.y + (Math.random() * 20 - 10)) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

// ─── BACKGROUND PAPERS ───────────────────────────────────────────────────────
function spawnBgPapers() {
  const container = document.getElementById('bg-papers');
  const EMOJIS = ['📄','📋','📊','📑','🗂️','📝','📃','🗒️'];
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('div');
    el.className = 'bg-paper';
    el.textContent = EMOJIS[i % EMOJIS.length];
    el.style.left = (Math.random() * 100) + 'vw';
    el.style.animationDuration = (8 + Math.random() * 14) + 's';
    el.style.animationDelay    = (-Math.random() * 20) + 's';
    el.style.fontSize           = (0.7 + Math.random() * 1.2) + 'rem';
    container.appendChild(el);
  }
}

// ─── RESTART ─────────────────────────────────────────────────────────────────
document.getElementById('restart-btn').addEventListener('click', initGame);

// ─── KEYBOARD SHORTCUTS ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === '1' || e.key === 's') playerAttack('stamp');
  if (e.key === '2' || e.key === 'r') playerAttack('redpen');
  if (e.key === '3' || e.key === 'p') playerAttack('ruler');
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
spawnBgPapers();
initGame();
</script>
