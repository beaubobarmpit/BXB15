<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braden Monster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #0a0e27;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
        }
        .container-fluid {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .machine {
            position: relative;
            width: 300px;
            height: 420px;
            border: 3px solid #4a9eff;
            background: linear-gradient(to bottom, #0b2259 0%, #151f30 100%);
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
            border-radius: 18px;
            overflow: hidden;
        }
        .machine::before {
            color: #4a9eff;
        }
        .machine-inner {
            position: absolute;
            inset: 12px;
            border: 2px dashed #45a29e;
            border-radius: 12px;
            overflow: hidden;
        }
        .can {
            position: absolute;
            left: calc(50% - 48px);
            top: 8px;
            width: 96px;
            height: 96px;
            cursor: pointer;
            user-select: none;
            transition: top 0.5s ease-in;
        }
        .can img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }
        .floor {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 30px;
            background: linear-gradient(to right, #45a29e, #1f8a9f);
        }
        .btn-group .btn {
            background-color: #4a9eff;
            color: #0a0e27;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-group .btn:hover {
            background-color: #6bb3ff;
            box-shadow: 0 0 15px rgba(74, 158, 255, 0.6);
        }
        #titleScreen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 14, 39, 0.95);
            z-index: 100;
        }
        #titleScreen .title-card {
            width: min(380px, calc(100% - 40px));
            padding: 36px 28px;
            background: linear-gradient(135deg, #1a1f3a 0%, #0a0e27 100%);
            border: 3px solid #4a9eff;
            border-radius: 14px;
            box-shadow: 0 0 30px rgba(74, 158, 255, 0.4);
            text-align: center;
        }
        #titleScreen h1 {
            margin: 0 0 18px;
            font-size: 2rem;
            color: #4a9eff;
        }
        #titleScreen p {
            margin: 0 0 28px;
            color: #8a8a8a;
            font-size: 16px;
            line-height: 1.5;
        }
        #titleScreen button {
            background-color: #4a9eff;
            color: #0a0e27;
            border: none;
            border-radius: 4px;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #titleScreen button:hover {
            background-color: #6bb3ff;
            box-shadow: 0 0 15px rgba(74, 158, 255, 0.6);
        }
        .message {
            font-size: 24px;
            font-weight: 600;
            color: #4a9eff;
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
        }
        .info-text {
            color: #8a8a8a;
            font-size: 14px;
            margin-top: 15px;
            letter-spacing: 0.5px;
        }
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: #4a9eff;
            color: #0a0e27;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 14px;
        }
        .back-button:hover {
            background-color: #6bb3ff;
            box-shadow: 0 0 15px rgba(74, 158, 255, 0.6);
        }
        #stats {
            color: #4a9eff;
            font-size: 18px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="titleScreen">
        <div class="title-card">
            <h1>Braden Monster</h1>
            <p>Click the can when it drops and beat the reaction time limit of 350ms.</p>
            <button id="playBtn">Play</button>
        </div>
    </div>
    <div class="container-fluid">
        <a href="../index.html" class="back-button">← Back</a>
        <h1 class="h3" style="color: #4a9eff;">Braden Monster</h1>
        <p style="color: #8a8a8a;">Wait for the can to drop, then click it within 350ms to catch it.</p>
        <div class="machine" id="machine">
            <div class="machine-inner" id="machineInner">
                <div class="can" id="can" title="Click me"><img src="../images/whitemonster.png" alt="White Monster" /></div>
                <div class="floor"></div>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-success" id="startBtn">Start Round</button>
            <button class="btn btn-warning" id="resetBtn" disabled>Reset</button>
        </div>
        <div class="message" id="message">Press Start to begin.</div>
        <div class="info-text" id="stats">Best: -- ms | Last: -- ms | Wins: 0</div>
    </div>

    <script>
        const can = document.getElementById('can');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const playBtn = document.getElementById('playBtn');
        const titleScreen = document.getElementById('titleScreen');
        const message = document.getElementById('message');
        const stats = document.getElementById('stats');
        let startTime = null;
        let dropTimer = null;
        let gameActive = false;
        let dropped = false;
        let roundComplete = false;
        let lastReaction = '--';
        let bestReaction = Infinity;
        let wins = 0;

        function setCanToStart() {
            can.style.transition = 'none';
            can.style.top = '8px';
            dropped = false;
            roundComplete = false;
            startTime = null;
        }

        function updateStats() {
            stats.textContent = `Best: ${bestReaction === Infinity ? '--' : bestReaction.toFixed(0)} ms | Last: ${lastReaction} ms | Wins: ${wins}`;
        }

        function startRound() {
            if (gameActive) return;
            gameActive = true;
            setCanToStart();
            message.textContent = 'Get ready...';
            startBtn.disabled = true;
            resetBtn.disabled = false;

            const delay = 1200 + Math.random() * 1800;
            dropTimer = setTimeout(() => {
                message.textContent = 'DROP! Click now!';
                startTime = performance.now();

                can.style.transition = 'top 0.5s ease-in';
                can.style.top = '280px';

                dropped = true;
                setTimeout(() => {
                    if (!roundComplete) {
                        roundComplete = true;
                        gameActive = false;
                        message.innerHTML = '<span style="color:#ff4d6d;">Missed! Too late to click on time.</span>';
                        lastReaction = 'miss';
                        updateStats();
                        startBtn.disabled = false;
                    }
                }, 700);
            }, delay);
        }

        function catchCan() {
            if (!gameActive || !dropped || roundComplete) return;

            const reaction = performance.now() - startTime;
            roundComplete = true;
            gameActive = false;
            lastReaction = reaction.toFixed(0);
            if (reaction <= 350) {
                wins++;
                bestReaction = Math.min(bestReaction, reaction);
                message.innerHTML = `<span style="color:#8cff66;">Win! Reaction: ${lastReaction} ms.</span>`;
            } else {
                message.innerHTML = `<span style="color:#ffcc66;">Too slow: ${lastReaction} ms (limit 350ms).</span>`;
            }
            updateStats();
            startBtn.disabled = false;
        }

        document.addEventListener('click', catchCan);
        // Keep can click for intuitive feedback too
        can.addEventListener('click', event => event.stopPropagation());

        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space') {
                event.preventDefault();
                catchCan();
            }
        });

        startBtn.addEventListener('click', () => {
            clearTimeout(dropTimer);
            startRound();
        });

        playBtn.addEventListener('click', () => {
            titleScreen.style.display = 'none';
            clearTimeout(dropTimer);
            startRound();
        });

        resetBtn.addEventListener('click', () => {
            clearTimeout(dropTimer);
            gameActive = false;
            setCanToStart();
            message.textContent = 'Reset complete. Press start to try again.';
            lastReaction = '--';
            bestReaction = Infinity;
            wins = 0;
            updateStats();
            startBtn.disabled = false;
            resetBtn.disabled = true;
        });

        setCanToStart();
        updateStats();
    </script>
</body>
</html>
